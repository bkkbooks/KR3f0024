body:
  text: 天步真原青州薛鳳祚撰日食原理日月泛遇為平㑹日月地心在一線為正會日月人目在一線為實㑹用東西南北差為視會求食限中華定食限取北中界地居赤道之北南不至赤道北不至北極日食依南方北極出地十八度北方北極出地四十二度定食限最廣者太陰距南交嘗度七度三十一分午時高下差全變為南北差以加二徑折半故距度少太陰距北交嘗度一十七度三十五分午時高下差全變為南北差以減二徑折半故距度多為可食之限最狹者太陰距南交嘗七度距北交嘗一十六度五十三分為必食之限月食不論陰陽厯其限皆一十五度一十二分在日之冲日月交入食限算朔在晝分望在夜分即有食日月越六月皆能再食若五月能再食則大月七月能再食則小月年月積日根數起漢庚辰至崇禎厯元後二十三年庚寅積一千六百五十年入厯減一算先求年變日表次月變日表搃計得第三旬周數第二旬周數第一旬周數日數大西東來應加一日日數末一日未成應減二算對仍依原數平朔中積月距日平行表搃計各旬周及日數平行度分以減全周得全周餘度又以距日平行表取近小度數求日時分並加于旬周日數為平朔中積日分如先得本年月朔望䇿只以朔望䇿逓加平朔免積日之煩望䇿一十四日十八小時二十二分二秒朔䇿倍之二十九日一十二小時四十四分四秒以中積入表求時分以中積入表求春分平行即以春分平行為引數求加減以中積入表求日平行以中積入表求日心平行即以心行為引數求心差加減及比例分以中積入表求高行以上叚所得心差加減之為真高行以日平行減直高為實引以實引入表求日初均及餘分以比例及餘分求次均度以初均次均度加減日平行為實經又加減春分為日自春分實經以中積入表求月距日度分兩倍之即月心平行以月心行入表求心行加減及比例分以月自行加減心差為月實引以月實引入表求月初均度及餘分以比例餘分求次均以日平行并月距日行得月平行以加減初次均為月實經又加減春分差為月自春分實經求平㑹離正㑹度分日月相距弧太陽均度與太陰均度若一加一減二均度相加得平㑹離正㑹度分若俱加或俱減以小減大其餘數即平㑹離正㑹度分求日月相距時刻以太陰實引數入表取月一時行度分若無正度用比例法以上叚平㑹離正㑹度分用三率法當行幾時刻為日月相距時刻日月在前在後日月均度或俱加加大者在前或俱減減小者在前若加減不同即減者在前月在日前平㑹比實㑹先到日在月前平㑹比實㑹後到相距時刻加減平㑹先到日月相距時刻加實㑹先到日月相距時刻減以加減平朔中積日分變時分為正㑹時刻試法真否以正㑹時刻再筭積日時分變日分日春分平行及加減日平行日心之平行及加減及比例日高行及真高行日實引數日加減度及餘分日次均日實經及自春分實經月距日平行及心行月心差及比例分月平引及實引月加減均度及餘分月次均月平行實經及自春分實經時分變日以下十六法皆同前惟月距日平行筭于太陽實經之後與上法異前後二筭太陽距太陰度差在三十秒以下即可用若差多再筭再筭法太陰實引數取月一時行用三率法一率月一時行分二率一時三率太陰距太陽差分第四得所求時分太陽在太陰前實㑹先到所得時減太陰在太陽前平㑹先到所得時加筭諸行俱同前應時以太陽實經度查黄赤道變度表得赤道度無正度用比例法太陽平行減黄道根數四周紀三十八度三十六分三十四秒平行小加一圏減其餘為黄道餘度變赤道度減赤道根數二百八十度三十五分赤道小加一圏減其餘為赤道餘度黄赤道二餘度相減變時分黄道餘度大時分加正㑹赤道餘度大時分加正㑹南京比立表之地又加七時二十八分北京又加二十分為實㑹應時以上定朔求太陽實㑹經緯度太陽黄道實經度變赤道即距赤道實經度太陽黄道實經度用表查緯度南北度分即太陽距赤道緯度求太陽距天頂度前後三時同用月在日前月加減大日加減小平㑹先到實㑹後到自應時自午而己辰向後筭三小時若月加減小日加減大月在日後平㑹後到實㑹先到自應時自午而未申向前筭三小時筭丁亥甲大三角有亥甲邉北極出地之餘有亥丁邉日過白羊初度緯在赤道北以日距赤道緯度減九十度若日過天枰初度緯在赤道南以日距赤道緯度加九十度有亥角距午時刻每時作十五度午後加赤道實經度午前減從不知之角打線從丁從甲皆可今從丁打線至巳先求亥巳線若大于亥丁分線在外小于亥丁分線在内先筭亥巳甲三角用圏線正角第三法有兩角一邉其先有邉為正角對邉法求亥巳邉先有角相連之邉有巳正角餘有亥角距午度分有亥甲邉北極出地之為正角對邉一率通弦二率亥角餘線三率亥甲邉切線四率得亥巳邉切線求甲巳邉先有角相連之邉此有巳正角用有求邉對亥角有亥甲邉為正法今捷法省此筭一率通弦二率亥角正線三率亥甲邉正線四率得甲己邉正線又筭甲己丁三角有己正角有己丁邉有甲己邉求己丁邉日距赤道緯度減九十度或加九十度除上所得亥巳邉即己丁邉求甲丁邉一率通弦二率甲己邉餘線三率己丁邉餘線四率得甲丁邉餘線為日距天頂度其餘即距地平筭前後三小時同法但時在午前以距午前分數減六十分所得求度分有時者每一時加十五度時在午後以距午後分數求度分有時者每一時加十五度為距午時有捷法省求甲己邉徑求甲丁邉一率亥巳邉餘線二率亥甲邉餘線三率己丁邉餘線四率即徑得甲丁邉餘線距天頂度餘距地平筭差角前後三時同用如圖丑甲午為差角然丑甲邉難取而甲己丙角與甲午之大小同故寜算丙甲己鈍用筭丙己邉離午時即前圖亥角每時十五度看在午前後在午後自午而未申加太陽實經變赤道度即應時所得在午前自午而巳辰減太陽實經變赤道度為過午時圏度即知入何宫度如得二百五十一度五十分即入天蝎一十一度五十分變黄道以表中赤道對黄道度數取黄道度有黄道度即可入表求黄道緯度又看黄緯在赤道南北在赤道北自白羊初至雙女三十度以緯度減北極出地所得在赤道南自天枰初至雙魚三十度以緯度加北極出地度所得為丙己邉筭己角丙己邉内有赤道過午時圏度離午時加實經所得有赤道變黄道度此入表不用過午時圏度用變黄道度求交角表有餘分則用比例法得己角筭甲角即差角一率丙甲邉距天頂正線二率己角正線三率丙己邉正線搃數相較即得甲角正線為差角求地平差此法或前或後三時同用東西南北差之本是高卑差高卑差之本是地平差以太隂實引數入表得其相對之分秒有餘數以下度與餘數比例或加或減于相對之數為太隂地平差崇禎厯書作地平徑數求太隂高卑差此法或前或後俱筭三時查表以所得地平差分數從上以前得距地平即距天頂減九十度之餘從右小餘另比例為先得太隂高卑差太陽高卑差以距地平查表得分秒以減先得太隂高卑差為太隂真高卑差恒減不加如圖日月在甲人目在地視之不見在甲而見在丁甲丙為日高即甲丁為高卑差就黄道極作一大圏至高卑差丁相交黄道又交過頂圏戊為正角凡各圏過本圏之極其相交之角即正角甲丁為高差日在甲人目視之不見在甲而見在戊即甲戊為東西差戊丁為南北差高卑差南北差東西差三者惟甲丁高卑差至大不過六十分其甲戊東西差戊丁南北差皆小于甲丁高卑差故皆銳角又且分數少在天俱可作直線筭東西差前後三時同法以通弦一為一率以前得差角即甲角餘線為二率三率以高卑差分秒俱化成秒求其對數與二率相加去一率通弦求原數以六十成分為東西差筭南北差前後三時同法以通弦一為一率以前得差角即甲角正線為二率三率以高卑差分秒俱化成秒求對數與二率數相加去通弦求原數以六十成分為南北差若查表第一行距天頂數第二行東西差邉第三行南北差邉省用前筭三角法如筭東西差一率六十分二率取表中第二行東西差邉三率前取太隂高卑差即得所用東西差南北差同法但取表中第三行表中各宫皆初分用法如午時正二刻六分日在天蝎一度四十六分八秒如天蝎一分午時得距天頂四十二度三十五分人馬一分午時得距天頂五十一度二十一分其差八度四十六分用下法一率一宫三十度二率八度四十六分三率天蝎一度四十六分八秒搃數較數即其差分以加先得四十二度三十五分即天蝎一度四十六分距天頂度東西南北差同法求視㑹筭日食月行以太隂實引數入表其表每隔三度以餘分求比例或加或減于正度之上為太隂一時分實行度有實行取視行第一法月食在黄道九十度限東東西差先大後小早間食辰時在先巳時在後午後食未時在先申時在後其上所筭第一時東西差與第二時東西差第三時東西差與第二時東西差相減其餘分與實行相減為視行若東西差先小後大其前後二差相減其餘分加實行為視行第二法日食在黄道九十度西東西差先大後小其東西差前後二差相減其餘分加實行為視行若先小後大其東西差前後二差相減其餘分減實行即為視行第三法一半在九十度限東一半在九十度西前後二東西差相減不論先後大小其餘與實行相減餘分即為視行視行距度東西差大實行小以實行減東西差其餘為實㑹與視㑹相距度分東西差小實行大即以東西差為實㑹距視㑹度分視㑹相去度變時法第一法若實㑹東西差比視行小其東西差分數要實㑹相近時視行比例分得實㑹與視㑹相去度數變時分第二法若實㑹東西差比視行大除一時月視行餘東西差分數要視㑹相近時視行比例分得實㑹與視㑹相去度數變時分二叚日食在東皆減實㑹時分為視㑹時分在西皆加實㑹時分為視㑹時分一率太隂實行二率六十分三率實㑹去視㑹度分俱化為秒乘除成分為所變時分用第一法加減實㑹為視㑹用第二法一時之外加減實㑹為視㑹試法真不真用所得視㑹再筭距天頂再筭差角地平差同前數再筭太隂高平差再筭東西差再筭南北差日食月行同前數有實行求視行以所得東西差置位一率六十分二率月一時實行三率上叚所得有實行求視㑹變時分俱化為秒乘除成分與置位東西差相減餘為差分有差分變時分一率上叚實㑹距視㑹度分二率上叚實㑹距視㑹所變時分三率差分俱化為秒乘除成分秒為變時差分大東西差小上叚視㑹時分内當減變時分為視㑹差分以加減實㑹為視㑹差分小東西差大上叚視㑹時分内當加變時分為視㑹差分以加減實㑹為視㑹時分差至三十秒内即定視㑹若多又用三試其筭法與第二叚試法同但要所得差分成時與東西差合方定視㑹求日食大小筭交行以日月實㑹時分用應時定數入平距度表搃計交行度以太隂均度依號加減之為實㑹交行以加減東西差為日月視㑹交行度實㑹在前東西差減實㑹若在後東西差加求距度以交行宫度分秒查距度表有小餘用比例法為視㑹距度又本表後行餘分比例下度差分為正餘分與太隂心差比例分相較乘除以加距度為真距度恒加不減日月食若無此比例分及餘分者省此筭距度一二宮北下三四五宮南下六七八宮南上九十土宮北上求視距度正交㸔在南在北與南北差同類相加異類相減北極出地二十三度三十一分以上皆在南為視距度若南北差大于距度其日食交在北者移而南求日月半徑以太陽實引數入表求日半徑以太隂實引數入表求月半徑以兩半徑搃數減視距度餘數為食分距度若距度大于兩半徑搃數即無食食分以太陽全徑為一率日月兩半徑搃數減視距度為二率西法十二分為三率取第四即西法日食分又作中國分以西法十二分為一率以所得西法日食分為二率中法日食十分為三率取第四即中法日食分用表以日全徑從右以距度分從上再以日全徑小餘從右以距度分從上得食分求初虧以食甚前一時東西差與食甚時東西差相較餘數以加減月實引數所得月一時正行為食甚前一時視行取法與前有實行求視行同法用表以日月半徑搃數從上以真距交度分從右又以半徑搃數小餘從上以距交從右共得分秒以太隂食甚前一時視行為一率以一時六十分為二率以表上所取分秒為三率乘除成分得時分以減食甚時刻為初虧求復圓依法再求食甚後一小時距頂距地平差角高差東西差以食甚後一時與食甚東西差相較餘數以加減月實引所得月一時正行為食甚後一時視行用表同初虧法以加食甚時分為復圓丑卯黄道未寅白道丑未寅卯為距交子辰為太陽半徑午申為月半徑子丙為日月兩半徑搃數月食原理月食求積年日數筭太陽諸行太隂諸行皆與筭日食同求日月前後日月相距度相距時刻筭日月實㑹皆與日食同再筭試真否皆與日食同求太隂正中交行置實㑹中積日數分秒入太隂平距度表搃計交行度數加減太隂均度得交平行求太隂距交分餘分有比例分取用無比例分省筆以太隂平交行入距交度表得距交分無正度分用比例法初一二九十十一宫北三四五六七八宫南求太隂半徑及全徑以太隂實引數入表得太隂半徑無正度用比例法倍之為太隂全徑求地景半徑以太隂實引數入表得地景徑無正度用比例法減對行秒餘為真半徑兩半徑減距交餘數月半徑加地景半徑并之以所得距交分數減之所得為二徑餘數食分日月食表月全徑從右二徑餘數從上得月食分月食有初虧食既食甚生光復圓五叚若在十二分以内食不全及全食即生光者去食甚生光二叚西法月作十二分筭中法月食作十五分如西法筭月食十八分一秒一率十二分二率十八分三率十分得中法十五分食既分食甚分月食不全或全食而食盡即生光者所得為食既分若月全食食後不即生光者所得為食甚分食時分表以月半徑地景徑并之搃數從上月交距度從右無正度用比例法為食既與食甚度分初虧分實㑹減食既與食甚分為初虧分有食甚求食既分月食不全不必再筭以月半徑減地景半徑從上月交距度從右無正度用比例法以減食甚分為食既分生光以前所得有食甚求食既分數加食甚為生光分復圓實㑹並食既與食甚分倍加之為復圓分太隂一時實行表求太隂一時實行無正度用比例法以食甚分實行求食無正時用比例法為食甚時分以食既分實行求時為食既時分求正時太陽平行減黄道根數得黄道餘度太陽實經度黄赤道同升度減赤道根數得赤道餘度二餘度相減以二餘度入變時表查時為時差黄道餘大加實㑹赤道餘大減實㑹又加本地與立表之地所差時分如南京差七時二十八分北京差二十分為真實㑹時刻天步真原
