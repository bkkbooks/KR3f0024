body:
  text: 天步真原天文算法類推步之屬提要臣等謹案天步真原一卷國朝薛鳳祚所譯西洋穆尼閣法也鳳祚有兩河清彚已著録順治中穆尼閣寄寓江寧喜與人談算術而不招人入耶蘇教在彼教中號為篤實君子鳳祚初從魏文魁遊主持舊法後見穆尼閣始改從西學盡傳其術因譯其所說為此書其法専推日月交食中間繪弧三角圖三一則有北極出地有日距赤道有時刻而求高弧一則有日距天頂有正午黃道有黃道與子午圈相交之角而求黃道高弧交角一則有黃道高弧交角有高下差而求東西南北二差末繪日食食分一圖鳳祚譯是書時新法初行又中西文字輾轉相通故詞㫖未能盡暢梅文鼎嘗訂證其書稱其法與崇禎新法厯書有同有異其似異而同者布算之同對數之表與厯書逈别然得數無二惟黃道春分二差則根數大異非測候無以斷其是非然其書在未修數理精藴之前録而存之猶可以見步天之術由疏入密之漸也乾隆四十七年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:76c9a460369401c1077b9fbd31961a194dcae2775f17a2c1593e5c8718a86395
